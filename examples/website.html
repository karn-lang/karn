class _Ok {
  constructor(v) { this.v = v; }
  toString() { return `Ok(${JSON.stringify(this.v)})`; }
}

class _Err extends Error {
  constructor(msg, ctx) { super(msg); this.ctx = ctx || []; }
  toString() { return `Err(${this.message})`; }
}

function _prop(v) {
  if (v instanceof _Err) throw v;
  if (v instanceof _Ok) return v.v;
  return v;
}

const http = {
  async get(url, opts) {
    try {
      const r = await fetch(url, opts);
      return new _Ok(await r.text());
    } catch(e) { return new _Err(e.message); }
  },
  async post(url, body) {
    return this.get(url, { method: "POST", body: JSON.stringify(body), headers: {"Content-Type":"application/json"} });
  }
};

const fs = {
  read(path) { return new _Err("fs.read not available in browser"); },
  write(path, content) { try { localStorage.setItem(path, content); return new _Ok(null); } catch(e) { return new _Err(e.message); } },
  list(path) { return new _Ok([]); }
};

const log = {

  warn: (...a) => { const m = a.map(x => typeof x==="object" ? JSON.stringify(x) : String(x)).join(" "); console.warn(`[WARN] ${m}`); return new _Ok(null); },
  err:  (...a) => { const m = a.map(x => typeof x==="object" ? JSON.stringify(x) : String(x)).join(" "); console.error(`[ERR] ${m}`); return new _Ok(null); }
};

const env = {
  get: (k, d) => new _Ok(undefined),
  require: (k) => new _Err(`env ${k} not set in browser`)
};
